name: Escrow instruction integrity

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: escrow-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify-instructions:
    # Forked pull requests never receive repository secrets.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run Escrow
        id: escrow
        uses: ./
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: gpt-5.6-luna
          execute: "true"
          allow-network: "false"

      - name: Upload Escrow reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: escrow-report-${{ github.run_id }}
          path: .escrow-artifacts/
          if-no-files-found: warn

      - name: Publish pull-request summary
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          SUMMARY_PATH: ${{ steps.escrow.outputs.summary-report || '.escrow-artifacts/escrow-summary.md' }}
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const marker = '<!-- escrow-ci-summary -->';
            const fallback = `${marker}\n## Escrow — instruction integrity\n\nEscrow did not complete. See the workflow logs.`;
            const body = fs.existsSync(process.env.SUMMARY_PATH)
              ? fs.readFileSync(process.env.SUMMARY_PATH, 'utf8')
              : fallback;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find((comment) => comment.user.type === 'Bot' && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Enforce Escrow result
        if: always()
        run: node scripts/verify-ci-report.mjs .escrow-artifacts/escrow-report.json "${{ steps.escrow.outputs.status || '4' }}"
