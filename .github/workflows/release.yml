# Canonical repository: https://github.com/PlutonicSauce/escrow
name: Escrow release package

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Verify tag matches package version
        shell: bash
        run: test "v$(node -p "require('./package.json').version")" = "$GITHUB_REF_NAME"

      - name: Install and verify
        run: |
          npm ci
          npm run typecheck
          npm test
          npm run build
          npm run package:smoke

      - name: Build release package
        run: |
          mkdir release
          npm pack --pack-destination release

      - uses: actions/upload-artifact@v4
        with:
          name: escrow-package-${{ github.ref_name }}
          path: release/*.tgz
          if-no-files-found: error

  release:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: escrow-package-${{ github.ref_name }}
          path: release

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release/*.tgz --verify-tag --generate-notes
